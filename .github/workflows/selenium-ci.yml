name: Selenium Python CI

on: [push]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.12"

      - name: Install system packages (Xvfb, Chromium, Chromedriver)
        run: |
          sudo apt-get update
          sudo apt-get install -y Xvfb chromium-browser, chromium-chromedriver

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Start Xvfb
        run: |
          Xvfb :99 -screen 0 1920x1080x24 &
          encho "DISPLAY=:99" >> $GITHUB_ENV

      - name: Run Pytest
        run: |
          pytest -m pytest -v --html=report.html --self-contained-html

      - name: Upload HTML report
        uses: actions/upload-artifact@v4
        with:
          name: selenium-tests-report
          path: report.html
